name: erofs-cibot

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      ignore_existing_prs:
        description: "Ignore matching existing PRs and open a fresh PR"
        required: false
        default: false
        type: boolean
      lookback_hours:
        description: "Hours of mail history to scan for candidate patch series"
        required: false
        default: "48"
        type: string
      close_upstreamed_prs:
        description: "Close bot PRs already referenced by recent upstream lore links"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: erofs-cibot-mutations
  cancel-in-progress: false

jobs:
  bridge:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure gh CLI
        env:
          REQUEST_COPILOT_REVIEW: ${{ vars.REQUEST_COPILOT_REVIEW || '1' }}
        run: |
          if [ "$REQUEST_COPILOT_REVIEW" != "1" ]; then
            echo "Copilot review disabled; skipping gh check."
            exit 0
          fi

          if command -v gh >/dev/null 2>&1; then
            gh --version
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y gh
          gh --version

      - name: Restore clone cache
        uses: actions/cache@v4
        with:
          path: /tmp/erofs-cibot-cache
          key: erofs-cibot-clone

      - name: Install project
        run: pip install .

      - name: Sync target branch from upstream experimental
        env:
          SOURCE_OWNER: erofs
          SOURCE_REPO: erofs-utils
          SOURCE_BRANCH: experimental
          TARGET_OWNER: ${{ vars.OWNER || 'erofs' }}
          TARGET_REPO: ${{ vars.REPO || 'erofs-utils' }}
          TARGET_BRANCH: ${{ vars.BASE_BRANCH || 'experimental' }}
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          git config --local --unset-all http.https://github.com/.extraheader || true

          source_repo="${SOURCE_OWNER}/${SOURCE_REPO}"
          target_repo="${TARGET_OWNER}/${TARGET_REPO}"

          if [ "$source_repo" = "$target_repo" ] && [ "$SOURCE_BRANCH" = "$TARGET_BRANCH" ]; then
            echo "Target already matches ${source_repo}:${SOURCE_BRANCH}; skipping branch sync."
            exit 0
          fi

          git fetch --no-tags --depth=1 \
            "https://github.com/${SOURCE_OWNER}/${SOURCE_REPO}.git" \
            "+refs/heads/${SOURCE_BRANCH}:refs/remotes/upstream-sync/${SOURCE_BRANCH}"

          if [ -z "${APP_ID:-}" ] || [ -z "${APP_PRIVATE_KEY:-}" ]; then
            echo "Missing APP_ID or APP_PRIVATE_KEY for branch sync." >&2
            exit 1
          fi

          token="$(python -c "import os; from erofs_cibot.github_api import GitHubAppClient; private_key = os.environ['APP_PRIVATE_KEY'].replace('\\\\n', '\\n'); client = GitHubAppClient(os.environ['APP_ID'], private_key); print(client.create_installation_token(os.environ['TARGET_OWNER'], os.environ['TARGET_REPO']))")"
          auth_header="$(SYNC_TOKEN="$token" python -c "import os; from erofs_cibot.gitops import _auth_header; print(_auth_header(os.environ['SYNC_TOKEN']))")"

          git -c "http.extraheader=${auth_header}" push --force \
            "https://github.com/${TARGET_OWNER}/${TARGET_REPO}.git" \
            "refs/remotes/upstream-sync/${SOURCE_BRANCH}:refs/heads/${TARGET_BRANCH}"

      - name: Run bridge
        env:
          ARCHIVE_ROOT: ${{ vars.ARCHIVE_ROOT || 'https://lists.ozlabs.org/pipermail/linux-erofs/' }}
          RAW_MESSAGE_ROOT: ${{ vars.RAW_MESSAGE_ROOT || 'https://lore.kernel.org/all/' }}
          OWNER: ${{ vars.OWNER || 'erofs' }}
          REPO: ${{ vars.REPO || 'erofs-utils' }}
          BASE_BRANCH: ${{ vars.BASE_BRANCH || 'experimental' }}
          LOOKBACK_HOURS: ${{ github.event_name == 'workflow_dispatch' && inputs.lookback_hours || vars.LOOKBACK_HOURS || '48' }}
          POLL_INTERVAL_HOURS: ${{ vars.POLL_INTERVAL_HOURS || '2' }}
          BOT_BRANCH_PREFIX: ${{ vars.BOT_BRANCH_PREFIX || 'ml' }}
          CLONE_DIR: ${{ vars.CLONE_DIR || '/tmp/erofs-cibot-cache' }}
          GIT_CLONE_DEPTH: ${{ vars.GIT_CLONE_DEPTH || '200' }}
          GIT_USER_NAME: ${{ vars.GIT_USER_NAME || 'erofs-cibot' }}
          GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL || 'erofs-cibot@lists.ozlabs.org' }}
          REQUEST_COPILOT_REVIEW: ${{ vars.REQUEST_COPILOT_REVIEW || '1' }}
          IGNORE_EXISTING_PRS: ${{ github.event_name == 'workflow_dispatch' && inputs.ignore_existing_prs && '1' || '0' }}
          CLOSE_UPSTREAMED_PRS: ${{ github.event_name == 'schedule' && '1' || github.event_name == 'workflow_dispatch' && inputs.close_upstreamed_prs && '1' || '0' }}
          GH_PATH: ${{ vars.GH_PATH || 'gh' }}
          COPILOT_REVIEW_TOKEN: ${{ secrets.COPILOT_REVIEW_TOKEN }}
          APP_ID: ${{ vars.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: erofs-cibot bridge
